# =============================================================================
# Production Override
#
# Usage (on VPS, via CI/CD):
#   docker compose -p production -f compose.yaml -f compose.production.yaml up -d
#
# Config is loaded from committed .env files.
# Service-specific secrets are generated by CI/CD as `.env.secrets.production.*` files.
#
# Caddy runs separately via compose.caddy.yaml on the same caddy_net network.
# =============================================================================

services:
  postgres:
    env_file:
      - .env
      - .env.production
      - .env.secrets.production.postgres
    ports:
      - "127.0.0.1:5432:5432"

  app:
    env_file:
      - .env
      - .env.production
      - .env.secrets.production.app
    volumes:
      - next_cache:/app/.next/cache
    networks:
      default:
      caddy_net:
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  migrator:
    profiles: ["manual"]
    env_file:
      - .env
      - .env.production
      - .env.secrets.production.app
      - .env.secrets.production.migrator

volumes:
  next_cache:

networks:
  caddy_net:
    external: true
