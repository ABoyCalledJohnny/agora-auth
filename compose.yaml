# =============================================================================
# Base Compose — shared structure for all environments.
#
# This file contains NO env vars, no secrets, no env_file references.
# Those are added by environment-specific override files:
#
#   Local dev:  docker compose up
#               (auto-merges compose.yaml + compose.override.yaml)
#
#   Testing:    docker compose -f compose.yaml -f compose.test.yaml up
#
#   Staging:    docker compose -f compose.yaml -f compose.staging.yaml up -d
#               (on VPS, via CI/CD — uses project name "staging")
#
#   Production: docker compose -f compose.yaml -f compose.production.yaml up -d
#               (on VPS, via CI/CD — uses project name "production")
#
# Caddy is shared across staging and production via an external network.
# Create it once on the VPS:  docker network create caddy_net
# =============================================================================

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

