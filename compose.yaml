# =============================================================================
# Base Compose — shared structure for all environments.
#
# This file contains NO env vars, no secrets, no env_file references.
# Those are added by environment-specific override files:
#
#   Local dev:  docker compose up
#               (auto-merges compose.yaml + compose.override.yaml)
#
#   Production: docker compose -p production -f compose.yaml -f compose.production.yaml up -d
#               (on VPS, via CI/CD — uses project name "production")
#
# Caddy routes traffic via an external network.
# Create it once on the VPS:  docker network create caddy_net
# =============================================================================

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: ${IMAGE_REGISTRY:-local}/${APP_IMAGE_NAME:-agora-auth-app}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "try{const r=await fetch(''http://localhost:3000/api/live'');if(!r.ok)process.exit(1)}catch{process.exit(1)}"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  migrator:
    image: ${IMAGE_REGISTRY:-local}/${MIGRATOR_IMAGE_NAME:-agora-auth-migrator}:${IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
