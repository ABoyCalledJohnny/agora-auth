name: CI Pipeline

on:
  push:
    branches:
      - "**" # Runs on ALL branches on push
  pull_request:
    branches:
      - main

env:
  BUN_VERSION: "1.3.10"
  APP_DB_USER: "ci_app_user"
  APP_DB_PASSWORD: "ci_app_password"
  JWT_PRIVATE_KEY: "ci_dummy_private_key"
  JWT_PUBLIC_KEY: "ci_dummy_public_key"
  SMTP_HOST: "localhost"
  SMTP_PORT: "1025"
  SMTP_USER: "ci_dummy_smtp_user"
  SMTP_PASSWORD: "ci_dummy_smtp_password"

jobs:
  verify-and-build:
    name: 🧪 Verify & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📚 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔒 Security Audit
        # Fails the pipeline if high or critical vulnerabilities exist in production packages
        run: bun audit --prod --audit-level=high

      - name: 💅 Format Check
        run: bun run format:check

      - name: 🧹 Run Linting
        run: bun run lint

      - name: 🏷️ Type Check
        run: bun run typecheck

      - name: 🏗️ Build Application
        # Verifies that Next.js can successfully compile the project
        run: bun run build
